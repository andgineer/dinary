# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: dinary
site_url: https://andgineer.github.io/dinary
site_author: Andrey Sorokin

# Repository
repo_name: dinary
repo_url: https://github.com/andgineer/dinary
edit_uri: edit/master/docs
docs_dir: 'src/LANGUAGE'
site_dir: 'SITE_DIR'

plugins:
  - awesome-pages
  - search:
      lang: LANGUAGE
  - mkdocstrings:
        handlers:
          python:
            options:
              show_root_heading: true

markdown_extensions:
  - abbr
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: 'docs/includes'
  - admonition

theme:
  name: material
  features:
    - toc.integrate
    - navigation.tracking
    - content.code.copy

extra:
  alternate:
    - name: English
      link: /dinary/
      lang: en
    - name: Русский
      link: /dinary/ru/
      lang: ru

nav:
  - index.md
  - analytics.md
  - installation.md
  - google-sheets-setup.md
  - pwa-install.md
  - deploy-oracle.md
  - deploy-selfhost.md
  - cloudflare-setup.md
  - operations.md
  - development.md
