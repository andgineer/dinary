services:
  dinary:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DINARY_GOOGLE_SHEETS_CREDENTIALS_PATH=/app/credentials.json
      - DINARY_LOG_JSON=true
    volumes:
      - ~/.config/gspread/service_account.json:/app/credentials.json:ro
    restart: unless-stopped
