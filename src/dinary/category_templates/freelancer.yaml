# Freelancer / sole proprietor — personal and business in one wallet. Detailed
# work sphere; eating-out split into a group so business and personal coexist.
id: freelancer
names: { en: Freelancer, ru: Фрилансер, sr: Frilenser }
taglines:
  en: Personal and business expenses in one wallet.
  ru: Личные и рабочие расходы в одном кошельке.
  sr: Lični i poslovni troškovi u jednom novčaniku.

groups:
  food:       { en: Food,           ru: Еда, sr: Hrana }
  eating_out: { en: Eating out,     ru: Еда вне дома, sr: Izlasci }
  work:       { en: Work,           ru: Работа, sr: Posao }
  housing:    { en: Housing,        ru: Жильё, sr: Stanovanje }
  life:       { en: Life,           ru: Жизнь, sr: Život }
  taxes:      { en: Taxes,          ru: Налоги и сборы, sr: Porezi }

