<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#16213e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Dinary</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
  <link rel="stylesheet" href="/css/style.css">

</head>
<body>

<header>
  <h1>Dinary <span id="header-version"></span></h1>
  <span class="queue-badge" aria-label="Queued entries count"></span>
</header>

<main>
  <div class="card">
      <button id="qr-btn" class="btn btn-secondary" type="button">Scan QR</button>
    <span class="offline-hint" style="display:none">Offline — will sync later</span>
    <video id="qr-video" style="display:none; width:100%; border-radius:8px"></video>
  </div>

  <div class="card">
    <div class="form-group">
      <label for="amount">Amount (RSD)</label>
      <input id="amount" type="text" inputmode="decimal" placeholder="0" autocomplete="off">
    </div>

    <div class="form-group">
      <label for="group">Envelope
        <button id="add-group-btn" class="btn-inline" type="button" title="Новая группа">+ Новый</button>
      </label>
      <select id="group">
        <option value="">— loading —</option>
      </select>
    </div>

    <div class="form-group">
      <label for="category">Category
        <button id="add-category-btn" class="btn-inline" type="button" title="Новая категория">+ Новый</button>
      </label>
      <select id="category">
        <option value="">— select group first —</option>
      </select>
      <div id="add-category-hint" class="form-hint" hidden>Сначала выберите группу</div>
    </div>

    <div class="form-group">
      <label for="event">Event
        <button id="add-event-btn" class="btn-inline" type="button" title="Новое событие">+ Новый</button>
      </label>
      <select id="event">
        <option value="">— без события —</option>
      </select>
    </div>

    <div class="form-group">
      <label>Tags
        <button id="add-tag-btn" class="btn-inline" type="button" title="Новый тэг">+ Новый</button>
      </label>
      <div id="tags" class="tags-list"></div>
    </div>

    <div class="form-group">
      <label for="comment">Comment</label>
      <textarea id="comment" rows="2" placeholder="Optional note"></textarea>
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <input id="date" type="date">
    </div>

    <button id="save-btn" class="btn btn-primary" type="button">Save</button>
  </div>
</main>

<div id="queue-modal" class="modal" style="display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);align-items:center;justify-content:center;padding:1rem">
  <div class="modal-content" style="background:var(--surface,#16213e);border-radius:12px;padding:1.25rem;width:100%;max-width:420px;max-height:80vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <h2 style="font-size:1.1rem;font-weight:600;margin:0">Queued expenses</h2>
      <button id="queue-modal-close" style="background:none;border:none;color:#94a3b8;font-size:2rem;cursor:pointer;padding:0.25rem 0.5rem;line-height:1">&times;</button>
    </div>
    <div id="queue-error" style="display:none;background:var(--error);color:#fff;padding:0.5rem 0.75rem;border-radius:8px;font-size:0.85rem;margin-bottom:0.75rem"></div>
    <div id="queue-list"></div>
    <button id="queue-copy" class="btn btn-secondary" type="button">Copy to clipboard</button>
    <div id="version-info" style="margin-top:1rem;font-size:0.75rem;color:#64748b;text-align:center"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
