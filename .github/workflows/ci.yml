
# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions
#
name: CI

env:
  PRIMARY_PYTHON_VERSION: '3.13'
  PRIMARY_PLATFORM: 'ubuntu-latest'
  # Force Python's UTF-8 mode so text I/O (e.g.
  # ``yoyo.read_migrations`` opening ``*.sql`` files) defaults to
  # utf-8 on every platform. Without this the Windows matrix entries
  # fall back to cp1252 and crash on any non-ASCII byte in migration
  # comments (e.g. ``"отпуск"`` / em-dashes), producing a fleet of
  # ``UnicodeDecodeError: 'charmap' codec can't decode byte 0x81``
  # failures at fixture-collection time.
  PYTHONUTF8: '1'
  PYTEST_CMD: >-
    python -m pytest
    -v
    --log-cli-level=DEBUG
    --log-cli-date-format="%H:%M:%S.%f"
    --log-cli-format="%(asctime)s %(levelname)s %(name)s %(message)s"
    --junitxml=pytest.xml
    --cov-report=term-missing:skip-covered
    --cov=src
    tests/

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  pull-requests: write
  contents: write

jobs:
  # Test compatibility with the matrix of Python versions and platforms
  matrix-build:
    strategy:
      matrix:
        python-version: [3.13, 3.14]
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}


    - name: Install uv environment
      uses: andgineer/uv-venv@v3

    - name: Install dependencies
      run: uv sync --frozen

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install JS dependencies
      run: npm ci

    - name: Run JS tests
      run: npm test

    - name: Test with pytest
      run: ${{ env.PYTEST_CMD }}

# Build with publishing Allure report, coverage report
  primary-build:
    runs-on: ubuntu-latest
    concurrency:
      group: github-pages
      cancel-in-progress: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ env.PRIMARY_PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PRIMARY_PYTHON_VERSION }}


    - name: Install uv environment
      uses: andgineer/uv-venv@v3

    - name: Install dependencies
      run: uv sync --frozen

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install JS dependencies
      run: npm ci

    - name: Run JS tests with Allure
      run: npm test

    - name: Test with pytest and Allure report
      run: "${{ env.PYTEST_CMD }} --alluredir=./allure-results"

    - name: Load Allure test report history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages-dir

    - name: Generate Allure test report
      uses: andgineer/allure-report@v3.6
      id: allure-report
      if: always()
      with:
        allure-results: allure-results
        website: gh-pages-dir
        reports-site-path: builds/tests

    - name: Publish Allure test report
      uses: peaceiris/actions-gh-pages@v3
      if: ${{ always() && (steps.allure-report.outcome == 'success') }}
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: ${{ steps.allure-report.outputs.reports-site }}
        destination_dir: ${{ steps.allure-report.outputs.reports-site-path }}

    - name: Coverage comment
      id: coverage_comment
      if: always()
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}
        MINIMUM_GREEN: 85
        MINIMUM_ORANGE: 70

    - name: Store Pull Request comment to be posted
      uses: actions/upload-artifact@v4
      if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
      with:
        name: python-coverage-comment-action
        path: python-coverage-comment-action.txt

    - name: Upload coverage data to coveralls.io
      if: always()
      continue-on-error: true
      uses: coverallsapp/github-action@v2

    - name: Upload Coverage to Codecov
      if: always()
      continue-on-error: true
      uses: codecov/codecov-action@v4.0.1
      with:
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}
