# LLM providers for receipt classification.
# Generate this file from a curated preset instead of editing manually:
#   llmbroker preset freetier > .deploy/llms.toml
# Then scaffold the required API-key env vars:
#   llmbroker env .deploy/llms.toml >> .deploy/.env
#
# This file is the single source of truth for the provider list: it is mirrored
# into the broker on every startup (providers added/changed/removed here appear,
# change, or disappear in the pool). The /llm admin screen is read-only apart from
# a persistent per-provider disable.  api_key_ref names an env var holding the
# actual key; keys are seeded into the DB on first start and are authoritative there
# afterwards.

[[llms]]
name        = "groq-llama-3.3-70b"
base_url    = "https://api.groq.com/openai/v1"
model       = "llama-3.3-70b-versatile"
api_key_ref = "GROQ_API_KEY"

[[llms]]
name        = "openrouter-gpt-oss-120b"
base_url    = "https://openrouter.ai/api/v1"
model       = "openai/gpt-oss-120b:free"
api_key_ref = "OPENROUTER_API_KEY"

[[llms]]
name        = "google-gemini-2.5-flash"
base_url    = "https://generativelanguage.googleapis.com/v1beta/openai"
model       = "gemini-2.5-flash"
api_key_ref = "GEMINI_API_KEY"

[keys]
GROQ_API_KEY = "Create a free API key at [groq](https://console.groq.com/keys) (sign in, then New API Key)."
OPENROUTER_API_KEY = "Create a free API key at [openrouter](https://openrouter.ai/keys)."
GEMINI_API_KEY = "Create a free API key at [aistudio](https://aistudio.google.com/apikey) (Google AI Studio)."
