# LLM providers for receipt classification.
# Copy this file to .deploy/llm_providers.toml.
# Seeded into the broker on first start (sync_configs policy="if_empty");
# manage a live deployment via the admin UI (/llm screen).
# api_key_ref names an env var (set in .deploy/.env) holding the actual key.
#
# Free-tier options (all OpenAI-compatible):
#   Groq:       https://console.groq.com/keys
#   OpenRouter: https://openrouter.ai/keys
#   Gemini:     https://aistudio.google.com/apikey

[[llms]]
name        = "groq-llama-3.3-70b"
base_url    = "https://api.groq.com/openai/v1"
model       = "llama-3.3-70b-versatile"
api_key_ref = "GROQ_API_KEY"

[[llms]]
name        = "openrouter-gpt-oss-120b"
base_url    = "https://openrouter.ai/api/v1"
model       = "openai/gpt-oss-120b:free"
api_key_ref = "OPENROUTER_API_KEY"

[[llms]]
name        = "google-gemini-2.5-flash"
base_url    = "https://generativelanguage.googleapis.com/v1beta/openai"
model       = "gemini-2.5-flash"
api_key_ref = "GEMINI_API_KEY"
